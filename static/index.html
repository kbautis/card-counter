<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Counter Trainer</title>
<style>
  :root {
    --bg: #0f1923;
    --surface: #1a2634;
    --surface-2: #243447;
    --green: #22c55e;
    --red: #ef4444;
    --gold: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #2d3f55;
    --card-bg: #ffffff;
    --card-red: #dc2626;
    --card-black: #0f172a;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 1.25rem 2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--gold);
  }

  .hint {
    font-size: 0.8rem;
    color: var(--muted);
  }

  main {
    width: 100%;
    max-width: 720px;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* ── Setup panel ── */
  .setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .setup-panel h2 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .controls.three-col {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  label {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 500;
  }

  .label-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .label-hint {
    font-size: 0.75rem;
    color: var(--muted);
    opacity: 0.7;
  }

  select, input[type="number"] {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 0.6rem 0.75rem;
    font-size: 0.95rem;
    width: 100%;
    appearance: none;
  }

  input[type="number"]::placeholder { color: var(--muted); }

  select:focus, input:focus {
    outline: 2px solid var(--gold);
    outline-offset: 1px;
  }

  .btn {
    padding: 0.7rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary   { background: var(--gold); color: #0f172a; width: 100%; }
  .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger    { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .btn-hint      { background: var(--surface-2); color: var(--muted); border: 1px solid var(--border); font-size: 0.8rem; padding: 0.4rem 0.9rem; }
  .btn-hint.active { background: rgba(245,158,11,0.15); color: var(--gold); border-color: rgba(245,158,11,0.4); }

  /* ── Game area ── */
  .game-area { display: none; flex-direction: column; gap: 1.5rem; }
  .game-area.active { display: flex; }

  /* Progress bar */
  .progress-bar-wrap {
    background: var(--surface-2);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--gold);
    border-radius: 99px;
    transition: width 0.15s linear;
    width: 0%;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.5rem;
    gap: 0.5rem;
  }

  .progress-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-shrink: 0;
  }

  /* Card stage */
  .card-stage {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Playing card */
  .playing-card {
    width: 130px;
    height: 190px;
    background: var(--card-bg);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
    animation: flipIn 0.25s ease-out;
    user-select: none;
  }

  @keyframes flipIn {
    from { transform: rotateY(90deg) scale(0.8); opacity: 0; }
    to   { transform: rotateY(0deg)  scale(1);   opacity: 1; }
  }

  .card-corner {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
    gap: 2px;
  }

  .card-corner.bottom { transform: rotate(180deg); }

  .card-rank       { font-size: 1.4rem; font-weight: 800; }
  .card-suit-small { font-size: 1rem; }
  .card-suit-center { font-size: 3.5rem; line-height: 1; }

  .card-red   .card-rank,
  .card-red   .card-suit-small,
  .card-red   .card-suit-center { color: var(--card-red); }

  .card-black .card-rank,
  .card-black .card-suit-small,
  .card-black .card-suit-center { color: var(--card-black); }

  /* Hi-Lo hint badge */
  .hilo-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 800;
    opacity: 0;
    transition: opacity 0.2s;
  }

  /* Badge is shown only when both .visible (card showing) and hints are on */
  .hilo-badge.show-hint.visible { opacity: 1; }
  .hilo-plus  { background: rgba(34,197,94,0.2);  color: var(--green); }
  .hilo-zero  { background: rgba(100,116,139,0.2); color: var(--muted); }
  .hilo-minus { background: rgba(239,68,68,0.2);  color: var(--red); }

  .done-msg {
    font-size: 1.1rem;
    color: var(--gold);
    font-weight: 600;
    text-align: center;
    padding: 2rem;
  }

  /* Answer panel */
  .answer-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    display: none;
    flex-direction: column;
    gap: 1rem;
  }

  .answer-panel.active { display: flex; }

  .answer-panel h2 { font-size: 1rem; font-weight: 600; }

  .answer-meta {
    font-size: 0.8rem;
    color: var(--muted);
  }

  .answer-row {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
  }

  .answer-row .control-group { flex: 1; }

  /* Result */
  .result-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    display: none;
    flex-direction: column;
    gap: 0.75rem;
    text-align: center;
  }

  .result-panel.active { display: flex; }

  .result-icon  { font-size: 2.5rem; }

  .result-title {
    font-size: 1.3rem;
    font-weight: 700;
  }

  .result-title.correct { color: var(--green); }
  .result-title.wrong   { color: var(--red); }

  .result-detail {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .result-detail strong { color: var(--text); }

  .result-stats {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    text-align: left;
    font-size: 0.85rem;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    color: var(--muted);
  }

  .stat-row strong { color: var(--text); }

  .true-count-note {
    font-size: 0.75rem;
    color: var(--muted);
    opacity: 0.7;
  }

  /* Hint reference */
  .hilo-reference {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    font-size: 0.82rem;
    color: var(--muted);
    display: none;   /* hidden by default; shown when hints are toggled on */
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .hilo-reference span { display: flex; align-items: center; gap: 0.35rem; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-gray  { background: var(--muted); }
  .dot-red   { background: var(--red); }
</style>
</head>
<body>

<header>
  <h1>🃏 Card Counter Trainer</h1>
  <span class="hint">Hi-Lo System</span>
</header>

<main>

  <!-- Setup -->
  <div class="setup-panel" id="setupPanel">
    <h2>Game Setup</h2>
    <div class="controls">
      <div class="control-group">
        <label for="numDecks">Number of Decks</label>
        <select id="numDecks">
          <option value="1">1 deck (52 cards)</option>
          <option value="2">2 decks (104 cards)</option>
          <option value="4" selected>4 decks (208 cards)</option>
          <option value="6">6 decks (312 cards)</option>
          <option value="8">8 decks (416 cards)</option>
        </select>
      </div>
      <div class="control-group">
        <label for="intervalMs">Card Speed</label>
        <select id="intervalMs">
          <option value="3000">Slow (3 sec)</option>
          <option value="2000" selected>Medium (2 sec)</option>
          <option value="1500">Fast (1.5 sec)</option>
          <option value="1000">Very Fast (1 sec)</option>
          <option value="600">Expert (0.6 sec)</option>
        </select>
      </div>
    </div>
    <div class="controls">
      <div class="control-group" style="grid-column: span 2;">
        <div class="label-row">
          <label for="numCards">Cards to Deal</label>
          <span class="label-hint" id="numCardsHint">max 208</span>
        </div>
        <input
          type="number"
          id="numCards"
          placeholder="Full shoe (208 cards)"
          min="5"
          max="208"
          step="1"
        >
      </div>
    </div>
    <button class="btn btn-primary" id="startBtn">Start Game</button>
  </div>

  <!-- Game -->
  <div class="game-area" id="gameArea">

    <div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-info">
        <span id="cardCounter">Card 0 of 0</span>
        <div class="progress-actions">
          <span id="timerDisplay"></span>
          <button class="btn btn-hint" id="hintToggle">Show Hints</button>
          <button class="btn btn-danger" id="stopEarlyBtn">Stop Early</button>
        </div>
      </div>
    </div>

    <div class="card-stage" id="cardStage">
      <div class="hilo-badge" id="hiloBadge"></div>
      <div class="playing-card" id="playingCard" style="display:none"></div>
      <div class="done-msg" id="doneMsg" style="display:none">All cards shown — enter your count below!</div>
    </div>

    <div class="hilo-reference" id="hiloReference">
      <span><span class="dot dot-green"></span> 2–6 = +1 (low cards)</span>
      <span><span class="dot dot-gray"></span> 7–9 = 0 (neutral)</span>
      <span><span class="dot dot-red"></span> 10, J, Q, K, A = −1 (high cards)</span>
    </div>

  </div>

  <!-- Answer -->
  <div class="answer-panel" id="answerPanel">
    <h2>What's your running count?</h2>
    <p class="answer-meta" id="answerMeta"></p>
    <div class="answer-row">
      <div class="control-group">
        <label for="userCount">Running Count</label>
        <input type="number" id="userCount" placeholder="e.g. +3 or −5" step="1">
      </div>
      <button class="btn btn-primary" id="submitBtn" style="white-space:nowrap">Submit</button>
    </div>
    <button class="btn btn-secondary" id="backToMenuBtn">← Back to Menu</button>
  </div>

  <!-- Result -->
  <div class="result-panel" id="resultPanel">
    <div class="result-icon"  id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="result-stats" id="resultStats" style="display:none"></div>
    <button class="btn btn-secondary" id="playAgainBtn" style="margin-top:0.5rem">Play Again</button>
  </div>

</main>

<script>
const SUIT_SYMBOLS = { hearts: '♥', diamonds: '♦', clubs: '♣', spades: '♠' };
const RED_SUITS = new Set(['hearts', 'diamonds']);

let cards        = [];
let currentIndex = 0;
let flipTimer    = null;
let sessionId    = null;
let hintsOn      = false;

// ── Elements ─────────────────────────────────────────────────────────────────
const setupPanel    = document.getElementById('setupPanel');
const gameArea      = document.getElementById('gameArea');
const answerPanel   = document.getElementById('answerPanel');
const resultPanel   = document.getElementById('resultPanel');
const startBtn      = document.getElementById('startBtn');
const submitBtn     = document.getElementById('submitBtn');
const playAgainBtn  = document.getElementById('playAgainBtn');
const progressBar   = document.getElementById('progressBar');
const cardCounter   = document.getElementById('cardCounter');
const timerDisplay  = document.getElementById('timerDisplay');
const playingCard   = document.getElementById('playingCard');
const hiloBadge     = document.getElementById('hiloBadge');
const doneMsg       = document.getElementById('doneMsg');
const userCountInput = document.getElementById('userCount');
const answerMeta    = document.getElementById('answerMeta');
const resultStats   = document.getElementById('resultStats');
const hintToggle    = document.getElementById('hintToggle');
const stopEarlyBtn  = document.getElementById('stopEarlyBtn');
const backToMenuBtn = document.getElementById('backToMenuBtn');
const hiloReference = document.getElementById('hiloReference');
const numDecksEl    = document.getElementById('numDecks');
const numCardsEl    = document.getElementById('numCards');
const numCardsHint  = document.getElementById('numCardsHint');

// ── Setup helpers ─────────────────────────────────────────────────────────────

function maxCards() { return parseInt(numDecksEl.value) * 52; }

function updateNumCardsHint() {
  const max = maxCards();
  numCardsHint.textContent = `max ${max}`;
  numCardsEl.max = max;
  numCardsEl.placeholder = `Full shoe (${max} cards)`;
  // Clamp existing value if it now exceeds new max
  if (numCardsEl.value && parseInt(numCardsEl.value) > max) numCardsEl.value = '';
}

numDecksEl.addEventListener('change', updateNumCardsHint);
updateNumCardsHint(); // run once on load

// ── Hints toggle ──────────────────────────────────────────────────────────────

hintToggle.addEventListener('click', () => {
  hintsOn = !hintsOn;
  hintToggle.textContent = hintsOn ? 'Hide Hints' : 'Show Hints';
  hintToggle.classList.toggle('active', hintsOn);
  hiloBadge.classList.toggle('show-hint', hintsOn);
  hiloReference.style.display = hintsOn ? 'flex' : 'none';
});

// ── Stop Early ────────────────────────────────────────────────────────────────

stopEarlyBtn.addEventListener('click', () => {
  if (flipTimer) { clearInterval(flipTimer); flipTimer = null; }
  stopEarlyBtn.disabled = true;

  // currentIndex is 0-based; the card at currentIndex is the last one shown
  const shown = currentIndex + 1;
  showDone(shown, cards.length);
});

// ── Start game ────────────────────────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  startBtn.textContent = 'Dealing…';

  const numDecks   = parseInt(numDecksEl.value);
  const intervalMs = parseInt(document.getElementById('intervalMs').value);
  const rawCards   = numCardsEl.value.trim();
  const numCards   = rawCards ? parseInt(rawCards) : null;

  // Client-side validation for num_cards
  if (numCards !== null) {
    if (isNaN(numCards) || numCards < 5 || numCards > maxCards()) {
      alert(`Cards to Deal must be between 5 and ${maxCards()}.`);
      startBtn.disabled = false;
      startBtn.textContent = 'Start Game';
      return;
    }
  }

  const body = { num_decks: numDecks, interval_ms: intervalMs };
  if (numCards !== null) body.num_cards = numCards;

  const res = await fetch('/api/session', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    alert(err.error || 'Failed to start game. Please try again.');
    startBtn.disabled = false;
    startBtn.textContent = 'Start Game';
    return;
  }

  const data = await res.json();
  cards        = data.cards;
  sessionId    = data.session_id;
  currentIndex = 0;

  // Reset hint state each game
  hintsOn = false;
  hintToggle.textContent = 'Show Hints';
  hintToggle.classList.remove('active');
  hiloBadge.classList.remove('show-hint');
  hiloReference.style.display = 'none';

  stopEarlyBtn.disabled = false;

  setupPanel.style.display = 'none';
  gameArea.classList.add('active');

  startFlipping(intervalMs);
});

// ── Card flipping ─────────────────────────────────────────────────────────────
function startFlipping(intervalMs) {
  showCard(currentIndex);
  flipTimer = setInterval(() => {
    currentIndex++;
    if (currentIndex >= cards.length) {
      clearInterval(flipTimer);
      flipTimer = null;
      showDone(cards.length, cards.length);
    } else {
      showCard(currentIndex);
    }
  }, intervalMs);
}

function showCard(index) {
  const card    = cards[index];
  const isRed   = RED_SUITS.has(card.suit);
  const colorClass = isRed ? 'card-red' : 'card-black';
  const suit    = SUIT_SYMBOLS[card.suit];
  const rank    = card.rank;

  playingCard.className = `playing-card ${colorClass}`;
  playingCard.innerHTML = `
    <div class="card-corner">
      <div class="card-rank">${rank}</div>
      <div class="card-suit-small">${suit}</div>
    </div>
    <div class="card-suit-center">${suit}</div>
    <div class="card-corner bottom">
      <div class="card-rank">${rank}</div>
      <div class="card-suit-small">${suit}</div>
    </div>
  `;
  playingCard.style.display = 'flex';
  doneMsg.style.display = 'none';

  // Hi-Lo badge (visibility controlled by .show-hint class on badge element)
  const value = hiLoValue(rank);
  hiloBadge.className = 'hilo-badge visible' +
    (hintsOn ? ' show-hint' : '') +
    ' ' + (value > 0 ? 'hilo-plus' : value < 0 ? 'hilo-minus' : 'hilo-zero');
  hiloBadge.textContent = value > 0 ? '+1' : value < 0 ? '−1' : '0';

  // Progress
  const pct = ((index + 1) / cards.length) * 100;
  progressBar.style.width = pct + '%';
  cardCounter.textContent = `Card ${index + 1} of ${cards.length}`;
  timerDisplay.textContent = `${cards.length - index - 1} remaining`;
}

function hiLoValue(rank) {
  if (['2','3','4','5','6'].includes(rank)) return +1;
  if (['7','8','9'].includes(rank)) return 0;
  return -1;
}

function showDone(cardsShown, totalCards) {
  playingCard.style.display = 'none';
  hiloBadge.classList.remove('visible');
  doneMsg.style.display = 'block';
  progressBar.style.width = (cardsShown / totalCards * 100) + '%';
  cardCounter.textContent  = `${cardsShown} of ${totalCards} cards shown`;
  timerDisplay.textContent = '';
  stopEarlyBtn.disabled    = true;

  const partial = cardsShown < totalCards;
  answerMeta.textContent = partial
    ? `You stopped at card ${cardsShown} of ${totalCards}. Enter the count for those cards.`
    : `All ${totalCards} cards shown. Enter your running count.`;

  answerPanel.classList.add('active');
  answerPanel.dataset.cardsShown = cardsShown;  // stash for submit
  userCountInput.focus();
}

// ── Submit answer ─────────────────────────────────────────────────────────────
submitBtn.addEventListener('click', submitAnswer);
userCountInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });

async function submitAnswer() {
  const raw       = userCountInput.value.trim();
  const userCount = parseInt(raw);
  if (isNaN(userCount)) { userCountInput.focus(); return; }

  submitBtn.disabled = true;

  const cardsShown = parseInt(answerPanel.dataset.cardsShown ?? cards.length);

  const res = await fetch('/api/verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sessionId, user_count: userCount, cards_shown: cardsShown }),
  });

  const result = await res.json();
  answerPanel.classList.remove('active');
  showResult(result);
}

function showResult(result) {
  const icon   = document.getElementById('resultIcon');
  const title  = document.getElementById('resultTitle');
  const detail = document.getElementById('resultDetail');

  if (result.correct) {
    icon.textContent  = '🎉';
    title.textContent = 'Correct!';
    title.className   = 'result-title correct';
    detail.innerHTML  = `Your count of <strong>${result.user_count}</strong> was spot on. Great work!`;
  } else {
    icon.textContent  = '❌';
    title.textContent = 'Not quite.';
    title.className   = 'result-title wrong';
    const sign = result.correct_count >= 0 ? '+' : '';
    detail.innerHTML  = `
      You said <strong>${result.user_count}</strong>,
      but the correct count was <strong>${sign}${result.correct_count}</strong>.<br>
      You were off by <strong>${result.delta}</strong>.
    `;
  }

  // Stats breakdown
  const statsLines = [];

  statsLines.push(`
    <div class="stat-row">
      <span>Running count</span>
      <strong>${fmtCount(result.correct_count)}</strong>
    </div>
  `);

  if (result.true_count !== null && result.true_count !== undefined) {
    const tc = result.true_count;
    const tcSign = tc >= 0 ? '+' : '';
    statsLines.push(`
      <div class="stat-row">
        <span>True count</span>
        <strong>${tcSign}${tc.toFixed(2)}</strong>
      </div>
    `);
    statsLines.push(`
      <div class="true-count-note">
        True count = running count ÷ decks remaining
        (${result.total_shoe_size - result.cards_shown} of ${result.total_shoe_size} cards left)
      </div>
    `);
  }

  if (result.cards_shown !== undefined && result.total_shoe_size !== undefined &&
      result.cards_shown < result.total_shoe_size) {
    statsLines.push(`
      <div class="stat-row">
        <span>Cards shown</span>
        <strong>${result.cards_shown} / ${result.total_shoe_size}</strong>
      </div>
    `);
  }

  if (statsLines.length) {
    resultStats.innerHTML  = statsLines.join('');
    resultStats.style.display = 'flex';
    resultStats.style.flexDirection = 'column';
    resultStats.style.gap = '0.4rem';
  } else {
    resultStats.style.display = 'none';
  }

  resultPanel.classList.add('active');
}

function fmtCount(n) {
  return (n >= 0 ? '+' : '') + n;
}

// ── Shared reset-to-menu helper ───────────────────────────────────────────────
function resetToMenu() {
  cards        = [];
  currentIndex = 0;
  sessionId    = null;
  if (flipTimer) { clearInterval(flipTimer); flipTimer = null; }

  resultPanel.classList.remove('active');
  answerPanel.classList.remove('active');
  gameArea.classList.remove('active');
  progressBar.style.width = '0%';
  userCountInput.value = '';
  submitBtn.disabled   = false;
  startBtn.disabled    = false;
  startBtn.textContent = 'Start Game';
  delete answerPanel.dataset.cardsShown;

  // Reset hints
  hintsOn = false;
  hintToggle.textContent = 'Show Hints';
  hintToggle.classList.remove('active');
  hiloBadge.classList.remove('show-hint');
  hiloReference.style.display = 'none';

  setupPanel.style.display = '';
}

// ── Play again ────────────────────────────────────────────────────────────────
playAgainBtn.addEventListener('click', resetToMenu);

// ── Back to Menu (from answer panel) ─────────────────────────────────────────
backToMenuBtn.addEventListener('click', resetToMenu);
</script>
</body>
</html>
